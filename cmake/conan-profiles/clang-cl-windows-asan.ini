# conan-profiles/clang-cl-windows-asan.ini
# clang-cl AddressSanitizer requires the RELEASE dynamic CRT (/MD) — it cannot link the debug
# CRT (/MDd). So dependencies must also use the release runtime, or you get
# "_ITERATOR_DEBUG_LEVEL mismatch (0 vs 2)" at link. Same as the debug profile otherwise.
[settings]
arch=x86_64
os=Windows
build_type=Debug
compiler=clang
compiler.version=17
compiler.cppstd=23
compiler.runtime=dynamic
compiler.runtime_type=Release

[conf]
tools.build:compiler_executables={"c":"clang-cl","cpp":"clang-cl","rc":"llvm-rc"}
